version: 2.1

jobs:
  lint:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install lint deps
          command: pip install --user flake8
      - run:
          name: Run flake8
          command: ~/.local/bin/flake8 pci_guard --max-line-length=120

  test:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install deps
          command: pip install --user -r requirements.txt
      - run:
          name: Run unit tests
          command: python -m pytest tests/ -v

  self-scan:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install deps
          command: pip install --user -r requirements.txt
      - run:
          name: Install OPA
          command: |
            curl -L -o opa https://openpolicyagent.org/downloads/v0.65.0/opa_linux_amd64_static
            chmod +x opa
            sudo mv opa /usr/local/bin/opa
      - run:
          name: Install Trivy
          command: |
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.70.0      
      - run:
          name: Run pci-guard against this repo
          command: python -m pci_guard.cli scan --target . --output report
      - store_artifacts:
          path: report
          destination: pci-compliance-report

workflows:
  build-test-scan:
    jobs:
      - lint
      - test:
          requires:
            - lint
      - self-scan:
          requires:
            - test
